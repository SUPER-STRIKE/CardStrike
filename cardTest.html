<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<title>CardStrike — Card effect tester</title>
<style>
  :root {
    --bg-0: #0b0f1a;
    --bg-1: #131a2b;
    --bg-2: #1d2742;
    --border: #2a3656;
    --text: #e7ecf7;
    --muted: #8a96b4;
    --accent: #5b8cff;
    --green: #34d399;
    --red: #ef4444;
    --amber: #fbbf24;
    --rare: #facc15;
    --common: #94a3b8;
    --special: #c084fc;
    --support: #34d399;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: radial-gradient(ellipse at top, #1b2547 0%, var(--bg-0) 60%);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  .app { max-width: 1400px; margin: 0 auto; padding: 24px; }
  header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 18px; flex-wrap: wrap; gap: 8px;
  }
  h1 { margin: 0; font-size: 22px; letter-spacing: 0.3px; }
  .tag {
    font-size: 12px; padding: 3px 10px; border-radius: 999px;
    background: var(--bg-2); color: var(--muted); border: 1px solid var(--border);
  }

  .board {
    display: grid;
    grid-template-columns: 1fr 360px 1fr;
    gap: 18px;
  }
  @media (max-width: 1100px) { .board { grid-template-columns: 1fr; } }

  .player {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .player.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 12px 40px -12px rgba(91, 140, 255, .6);
  }
  .player h2 {
    margin: 0; font-size: 16px;
    display: flex; align-items: center; gap: 10px; justify-content: space-between;
  }
  .player h2 .who { display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .player.active .dot { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

  .stat-row { display: flex; gap: 10px; }
  .stat {
    flex: 1; background: var(--bg-2); border-radius: 10px; padding: 10px 12px;
  }
  .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
  .stat .value { font-size: 22px; font-weight: 700; margin-top: 2px; }
  .hp-bar { height: 8px; background: var(--bg-0); border-radius: 999px; overflow: hidden; margin-top: 6px; }
  .hp-bar > div {
    height: 100%; background: linear-gradient(90deg, var(--green), #06b6d4);
    transition: width .25s ease;
  }

  .section-label {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px;
  }

  .mascot {
    min-height: 48px;
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 8px;
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .mascot .empty { color: var(--muted); font-size: 12px; }
  .tree {
    background: rgba(52, 211, 153, .12);
    color: var(--green);
    border: 1px solid rgba(52, 211, 153, .35);
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 12px;
  }

  .pending { display: flex; gap: 6px; flex-wrap: wrap; min-height: 22px; }
  .pending .chip {
    font-size: 11px; padding: 3px 8px; border-radius: 999px;
    background: rgba(251, 191, 36, .12);
    color: var(--amber);
    border: 1px solid rgba(251, 191, 36, .35);
  }
  .pending .empty { color: var(--muted); font-size: 12px; }

  .hand { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  @media (max-width: 1100px) { .hand { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 560px) { .hand { grid-template-columns: 1fr; } }

  /* ---------- 3D flip card ---------- */
  .card-3d-wrap {
    position: relative;
    perspective: 1100px;
    cursor: pointer;
    min-height: 320px;
  }
  .card-3d-wrap.disabled { opacity: .45; cursor: not-allowed; }
  .card-3d {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 320px;
    transform-style: preserve-3d;
    transition: transform .6s cubic-bezier(.2,.7,.2,1);
    will-change: transform;
  }
  .card-3d-wrap:hover:not(.disabled) .card-3d {
    transform: rotateY(180deg);
  }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 30px -16px rgba(0,0,0,.6);
  }
  .card-front {
    background: linear-gradient(180deg, rgba(29,39,66,0.95) 0%, rgba(15,22,40,0.96) 100%);
    padding: 12px;
    display: grid;
    grid-template-rows: auto auto 1fr auto auto;
    gap: 8px;
  }
  .card-3d-wrap:hover:not(.disabled) .card-front { border-color: var(--accent); }
  .card-back {
    transform: rotateY(180deg);
    background: #0b0f1a center / cover no-repeat;
  }

  .card-front .card-name { font-weight: 700; font-size: 14px; line-height: 1.25; }
  .card-front .avatar {
    background: var(--bg-0) center / cover no-repeat;
    border: 1px solid var(--border);
    border-radius: 8px;
    min-height: 130px;
  }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 11px; padding: 2px 7px; border-radius: 999px;
    background: var(--bg-0); color: var(--muted); border: 1px solid var(--border);
  }
  .badge.rare    { color: var(--rare);    border-color: rgba(250,204,21,.4); }
  .badge.common  { color: var(--common); }
  .badge.special { color: var(--special); border-color: rgba(192,132,252,.4); }
  .badge.support { color: var(--support); border-color: rgba(52,211,153,.4); }
  .cost-row { display: flex; gap: 8px; font-size: 12px; }
  .pill {
    background: var(--bg-0); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 999px;
  }
  .pill.mana { color: var(--accent); border-color: rgba(91,140,255,.4); }
  .pill.hp   { color: var(--red);    border-color: rgba(239,68,68,.4); }
  .card-front .effect { font-size: 12px; color: var(--muted); line-height: 1.5; }

  .center {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .turn-info { text-align: center; padding: 6px 0 2px; }
  .turn-info .who { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .turn-info .name { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .turn-info .num { font-size: 12px; color: var(--muted); margin-top: 6px; }

  .end-turn-btn {
    width: 100%; padding: 12px;
    background: linear-gradient(180deg, var(--accent) 0%, #4f7aef 100%);
    color: white; border: 0; border-radius: 10px;
    font-weight: 700; font-size: 14px; cursor: pointer;
    transition: transform .1s ease, box-shadow .15s ease;
  }
  .end-turn-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px -8px var(--accent); }
  .reset-btn {
    width: 100%; padding: 8px;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 10px;
    cursor: pointer; font-size: 12px;
  }
  .reset-btn:hover { color: var(--text); border-color: var(--accent); }

  .log {
    flex: 1; min-height: 280px; max-height: 480px; overflow-y: auto;
    background: var(--bg-0);
    border-radius: 10px;
    border: 1px solid var(--border);
    padding: 10px;
    font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
    font-size: 12px;
    line-height: 1.6;
  }
  .log .entry { padding: 1px 0; }
  .log .entry.turn   { color: var(--accent); border-top: 1px dashed var(--border); margin-top: 4px; padding-top: 6px; }
  .log .entry.play   { color: var(--text); }
  .log .entry.effect { color: var(--green); }
  .log .entry.cost   { color: var(--red); }
  .log .entry.proph  { color: var(--amber); }

  .badge-dead {
    font-size: 11px; padding: 2px 8px; border-radius: 999px;
    background: rgba(239,68,68,.12); color: var(--red);
    border: 1px solid rgba(239,68,68,.4);
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1>CardStrike — Card effect tester</h1>
      <span class="tag">2 players · 10,000 mana · 100 HP · 5% heal/cây/lượt</span>
    </header>
    <div class="board" id="board"></div>
  </div>

<script src="Card/GameMechanic/dist/gameMechanic.js"></script>
<script src="Card/Meta/Assets/card_assets.js"></script>
<script>
  /* ---------- Asset lookup ---------- */
  const FALLBACK_BACK = "Card/Assets/card-back.svg";
  function assetFor(name) {
    const a = (window.CARD_ASSETS || {})[name];
    return {
      avatar: a?.avatar || "",
      back: a?.back || FALLBACK_BACK,
    };
  }

  /* ---------- Data ---------- */
  const CARD_DATA = [
    {
      name: "Tiên tri hủy diệt",
      mana: 0,
      hpCost: 4,
      rarity: "Rare",
      type: "Special",
      effects: ["Nếu lượt chơi của người tiếp theo đánh ít nhất 1 lá bài, hồi 8 máu"],
    },
    {
      name: "Tiên tri hòa bình",
      mana: 4,
      hpCost: 0,
      rarity: "Common",
      type: "Special",
      effects: ["Nếu lượt chơi của người tiếp theo không đánh bài hồi 8 mana"],
    },
    {
      name: "Cây cổ thụ",
      mana: 10,
      hpCost: 0,
      rarity: "Common",
      type: "Support",
      effects: ["Đặt 1 cây vào ô linh vật của bạn, qua mỗi lượt 1 người chơi, hồi 5% máu tối đa"],
    },
  ];

  const MAX_HP = 100;
  const START_MANA = 10000;

  /* ---------- State ---------- */
  let state;

  function newPlayer(name) {
    return {
      name,
      hp: MAX_HP,
      maxHp: MAX_HP,
      mana: START_MANA,
      trees: 0,
      // Prophecies waiting to resolve at end of THIS player's next turn
      incomingProphecies: [],
    };
  }

  function freshState() {
    return {
      players: [newPlayer("Người chơi 1"), newPlayer("Người chơi 2")],
      current: 0,
      turn: 1,
      cardsThisTurn: 0,
      log: [],
      gameOver: false,
    };
  }

  function log(kind, text) {
    state.log.push({ kind, text });
    if (state.log.length > 300) state.log.shift();
  }

  /* ---------- Actions ---------- */
  function playCard(playerIdx, card) {
    if (state.gameOver) return;
    if (playerIdx !== state.current) return;

    const me = state.players[playerIdx];
    const opp = state.players[1 - playerIdx];

    if (me.hp <= 0) return;
    if (me.mana < card.mana) { log("cost", `${me.name} không đủ mana cho "${card.name}"`); return render(); }
    if (me.hp <= card.hpCost) { log("cost", `${me.name} không đủ HP cho "${card.name}"`); return render(); }

    me.mana -= card.mana;
    me.hp   -= card.hpCost;
    state.cardsThisTurn += 1;

    const costs = [];
    if (card.mana)   costs.push(`-${card.mana} mana`);
    if (card.hpCost) costs.push(`-${card.hpCost} HP`);
    log("play", `${me.name} chơi "${card.name}"${costs.length ? ` (${costs.join(", ")})` : ""}`);

    const GM = window.GM;
    const def = (GM.Cards || {})[card.name];
    if (def && Array.isArray(def.effects)) {
      const ctx = GM.makeContext(state, playerIdx, log);
      GM.applyEffects(def.effects, ctx);
    } else {
      log("proph", `   ↪ (Chưa cấu hình hiệu ứng cho "${card.name}")`);
    }
    render();
  }

  function endTurn() {
    if (state.gameOver) return;

    const me  = state.players[state.current];
    const opp = state.players[1 - state.current];

    // Resolve prophecies targeting THIS turn (set by opponent last turn)
    if (me.incomingProphecies.length) {
      const GM = window.GM;
      for (const p of me.incomingProphecies) {
        // Context flipped: self = OWNER of prophecy, opp = TARGET (me)
        const ctx = GM.makeContext(state, p.owner, log);
        const ok = GM.evaluateCondition(p.condition, ctx);
        log(
          "proph",
          `Tiên tri "${p.label}" — ${me.name} đánh ${state.cardsThisTurn} bài → ${ok ? "✓" : "✗"}`,
        );
        GM.applyEffects(ok ? p.thenEffects : p.elseEffects, ctx);
      }
      me.incomingProphecies = [];
    }

    // Switch turn
    state.current = 1 - state.current;
    state.turn += 1;
    state.cardsThisTurn = 0;

    // Turn-start passives (e.g. Cây cổ thụ heal) — run for both players
    const GM = window.GM;
    const passives = GM.TurnStartEffects || {};
    for (let i = 0; i < state.players.length; i++) {
      const ctx = GM.makeContext(state, /** @type {0|1} */ (i), log);
      for (const passiveId of Object.keys(passives)) {
        try {
          passives[passiveId](ctx);
        } catch (err) {
          log("proph", `(Lỗi passive "${passiveId}": ${err.message})`);
        }
      }
    }

    // Game over check
    for (const p of state.players) {
      if (p.hp <= 0) {
        state.gameOver = true;
        log("turn", `*** ${p.name} đã bị hạ gục — kết thúc trận ***`);
      }
    }

    if (!state.gameOver) {
      const next = state.players[state.current];
      log("turn", `── Lượt ${state.turn} · ${next.name} ──`);
    }
    render();
  }

  function reset() {
    state = freshState();
    log("turn", `── Lượt 1 · ${state.players[0].name} ──`);
    render();
  }

  /* ---------- Render ---------- */
  function render() {
    const board = document.getElementById("board");
    board.innerHTML = "";
    board.appendChild(renderPlayer(0));
    board.appendChild(renderCenter());
    board.appendChild(renderPlayer(1));
  }

  function renderPlayer(idx) {
    const p = state.players[idx];
    const isActive = state.current === idx && !state.gameOver;
    const dead = p.hp <= 0;

    const el = document.createElement("div");
    el.className = "player" + (isActive ? " active" : "");

    const hpPct = Math.max(0, (p.hp / p.maxHp) * 100);

    el.innerHTML = `
      <h2>
        <span class="who"><span class="dot"></span>${p.name}</span>
        ${dead ? `<span class="badge-dead">đã bị hạ</span>`
              : isActive ? `<span class="tag">đang đến lượt</span>` : ``}
      </h2>

      <div class="stat-row">
        <div class="stat">
          <div class="label">HP</div>
          <div class="value">${p.hp} / ${p.maxHp}</div>
          <div class="hp-bar"><div style="width:${hpPct}%"></div></div>
        </div>
        <div class="stat">
          <div class="label">Mana</div>
          <div class="value">${p.mana.toLocaleString()}</div>
        </div>
      </div>

      <div>
        <div class="section-label">Ô linh vật</div>
        <div class="mascot">
          ${p.trees > 0
            ? Array.from({ length: p.trees }, () => `<span class="tree">🌳 Cây cổ thụ</span>`).join("")
            : `<span class="empty">(trống)</span>`}
        </div>
      </div>

      <div>
        <div class="section-label">Lời tiên tri đang chờ — sẽ resolve cuối lượt sau của ${p.name}</div>
        <div class="pending">
          ${p.incomingProphecies.length
            ? p.incomingProphecies.map(pr => `
                <span class="chip">${pr.label} · chủ: ${state.players[pr.owner].name}</span>
              `).join("")
            : `<span class="empty">(không có)</span>`}
        </div>
      </div>

      <div>
        <div class="section-label">Tay bài (vô hạn — bấm để chơi)</div>
        <div class="hand">
          ${CARD_DATA.map(c => renderCard(idx, c, isActive)).join("")}
        </div>
      </div>
    `;

    el.querySelectorAll("[data-card]").forEach(node => {
      const name = node.getAttribute("data-card");
      const card = CARD_DATA.find(c => c.name === name);
      node.addEventListener("click", () => playCard(idx, card));
    });

    return el;
  }

  function renderCard(playerIdx, card, isActive) {
    const me = state.players[playerIdx];
    const affordableMana = me.mana >= card.mana;
    const affordableHp   = me.hp   >  card.hpCost;
    const disabled = !isActive || !affordableMana || !affordableHp;

    const reasons = [];
    if (!isActive)        reasons.push("Không phải lượt");
    if (!affordableMana)  reasons.push("Thiếu mana");
    if (!affordableHp)    reasons.push("Thiếu HP");

    const art = assetFor(card.name);
    const avatarStyle = art.avatar ? `background-image:url('${art.avatar}')` : "";
    const backStyle   = `background-image:url('${art.back}')`;

    return `
      <div class="card-3d-wrap ${disabled ? "disabled" : ""}" data-card="${card.name}" title="${reasons.join(" · ")}">
        <div class="card-3d">
          <div class="card-face card-front">
            <div class="card-name">${card.name}</div>
            <div class="badges">
              <span class="badge ${card.rarity.toLowerCase()}">${card.rarity}</span>
              <span class="badge ${card.type.toLowerCase()}">${card.type}</span>
            </div>
            <div class="avatar" style="${avatarStyle}"></div>
            <div class="cost-row">
              <span class="pill mana">${card.mana} mana</span>
              <span class="pill hp">${card.hpCost} HP</span>
            </div>
            <div class="effect">${card.effects.join("<br>")}</div>
          </div>
          <div class="card-face card-back" style="${backStyle}"></div>
        </div>
      </div>
    `;
  }

  function renderCenter() {
    const el = document.createElement("div");
    el.className = "center";
    const cur = state.players[state.current];
    el.innerHTML = `
      <div class="turn-info">
        <div class="who">${state.gameOver ? "Trận đấu kết thúc" : "Đang đến lượt"}</div>
        <div class="name">${state.gameOver ? "—" : cur.name}</div>
        <div class="num">Lượt ${state.turn} · Đã đánh ${state.cardsThisTurn} bài</div>
      </div>
      <button class="end-turn-btn" id="endTurn" ${state.gameOver ? "disabled style='opacity:.5;cursor:not-allowed'" : ""}>
        Kết thúc lượt →
      </button>
      <button class="reset-btn" id="reset">Reset trận</button>
      <div>
        <div class="section-label">Log</div>
        <div class="log" id="log">
          ${state.log.map(e => `<div class="entry ${e.kind}">${escapeHtml(e.text)}</div>`).join("")}
        </div>
      </div>
    `;
    el.querySelector("#endTurn").addEventListener("click", endTurn);
    el.querySelector("#reset").addEventListener("click", reset);
    setTimeout(() => {
      const logEl = el.querySelector("#log");
      if (logEl) logEl.scrollTop = logEl.scrollHeight;
    }, 0);
    return el;
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, ch => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    })[ch]);
  }

  if (!window.GM) {
    document.getElementById("board").innerHTML = `
      <div style="grid-column:1/-1;padding:24px;border:1px solid #ef4444;border-radius:12px;background:rgba(239,68,68,.08);color:#fca5a5;">
        <strong>Không tải được Card/GameMechanic/dist/gameMechanic.js.</strong><br>
        Chạy <code style="background:#0b0f1a;padding:2px 6px;border-radius:4px;">npm run build:mechanic</code>
        rồi reload trang.
      </div>`;
  } else {
    reset();
  }
</script>
</body>
</html>
